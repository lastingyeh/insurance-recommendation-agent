  - get_recommendation_rules

---
kind: prompt
name: insurance_recommendation_response_template
description: "Template for generating a conservative insurance recommendation response."
messages:
  - role: user
    content: |
      請根據以下資料生成初步保險推薦回覆。

      使用者條件摘要：
      {{.user_profile}}

      推薦商品資料：
      {{.product_candidates}}

      規則依據：
      {{.recommendation_rules}}

      生成回覆時請遵守以下原則：
      1. 說明推薦商品名稱
      2. 說明推薦原因
      3. 若有條件限制，需清楚提醒
      4. 若有等待期或除外條款，需簡短說明
      5. 不可承諾保證核保、保證理賠或保證收益
      6. 最後一定要加上：
         本建議僅供初步商品篩選，實際投保仍需以商品條款、健康告知與核保結果為準。
arguments:
  - name: user_profile
    description: "Normalized user profile summary."
  - name: product_candidates
    description: "Candidate insurance products from tools."
  - name: recommendation_rules
    description: "Recommendation rules returned from tools."

---
kind: prompt
name: insurance_followup_question_template
description: "Template for asking follow-up questions when user information is incomplete."
messages:
  - role: user
    content: |
      使用者目前提供的資訊如下：
      {{.known_information}}

      請以保險推薦代理的角色，向使用者追問缺少的必要資訊。
      必要資訊包括：
      - 年齡
      - 預算
      - 主要保障目標

      請用自然、簡潔、友善的中文發問，不要直接推薦商品。
arguments:
  - name: known_information
    description: "The currently known user information."