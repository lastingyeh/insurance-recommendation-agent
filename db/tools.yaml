kind: source
name: insurance_sqlite
type: sqlite
database: /workspace/db/insurance.db

---
kind: tool
name: search_medical_products
type: sqlite-sql
source: insurance_sqlite
description: Search medical insurance products by age and annual budget.
parameters:
  - name: age
    type: integer
    description: User age.
  - name: budget
    type: integer
    description: Annual insurance budget.
statement: |
  SELECT
      product_id,
      product_name,
      product_type,
      annual_premium_min,
      annual_premium_max,
      coverage_focus,
      coverage_summary,
      waiting_period_days,
      exclusions
  FROM insurance_products
  WHERE is_active = 1
    AND ? BETWEEN target_age_min AND target_age_max
    AND annual_premium_min <= ?
    AND product_type = 'medical'
  ORDER BY annual_premium_min ASC;

