---
kind: tool
name: search_income_protection_products
type: sqlite-sql
source: insurance_sqlite
description: Search income protection candidates, prioritizing critical illness products, by age and annual budget.
parameters:
  - name: age
    type: integer
    description: User age.
  - name: budget
    type: integer
    description: Annual insurance budget.
statement: |
  SELECT
      product_id,
      product_name,
      product_type,
      annual_premium_min,
      annual_premium_max,
      coverage_focus,
      coverage_summary,
      waiting_period_days,
      exclusions
  FROM insurance_products
  WHERE is_active = 1
    AND ? BETWEEN target_age_min AND target_age_max
    AND annual_premium_min <= ?
    AND product_type IN ('critical_illness', 'life')
  ORDER BY
      CASE WHEN product_type = 'critical_illness' THEN 0 ELSE 1 END,
      annual_premium_min ASC;

---
kind: tool
name: get_product_detail
type: sqlite-sql
source: insurance_sqlite
description: Get detailed information for a single insurance product by product_id.
parameters:
  - name: product_id
    type: integer
    description: Insurance product ID.
statement: |
  SELECT
      product_id,
      product_name,
      product_type,
      target_age_min,
      target_age_max,
      annual_premium_min,
      annual_premium_max,
      coverage_focus,
      coverage_summary,
      waiting_period_days,
      exclusions,
      is_active
  FROM insurance_products
  WHERE product_id = ?
    AND is_active = 1;

---
kind: tool
name: get_recommendation_rules
type: sqlite-sql
source: insurance_sqlite
description: Get recommendation rules related to the user's main protection goal.
parameters:
  - name: main_goal
    type: string
    description: Main protection goal.
statement: |
  SELECT
      rule_id,
      rule_name,
      product_type,
      condition_json,
      recommendation_logic,
      priority
  FROM recommendation_rules
  WHERE is_active = 1
    AND (
      (? = 'medical' AND product_type = 'medical')
      OR (? = 'accident' AND product_type = 'accident')
      OR (? = 'life' AND product_type = 'life')
      OR (? = 'family_protection' AND product_type = 'life')
      OR (? = 'income_protection' AND product_type IN ('critical_illness', 'life'))
    )
  ORDER BY priority ASC;

---
kind: toolset
name: insurance_recommendation_tools
tools:
  - search_medical_products
  - search_accident_products
  - search_family_protection_products
  - search_income_protection_products
  - get_product_detail
  - get_recommendation_rules

---
kind: toolset
name: insurance_debug_tools
tools:
